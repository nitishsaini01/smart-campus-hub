<!DOCTYPE html>
<html>

<head>

<title>Team Workspace</title>

<link rel="stylesheet" href="/css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Smart Campus</h2>

<button id="themeToggle" class="theme-btn">
<i class="fa-solid fa-moon"></i> Toggle Theme
</button>

<a href="dashboard.html">Dashboard</a>
<a href="resources.html">Resources</a>
<a href="upload.html">Upload Resource</a>
<a href="departments.html">Departments</a>
<a href="students.html">Students</a>
<a href="assignments.html">Assignments</a>
<a href="teams.html" class="active">Teams</a>
<a href="profile.html">Profile</a>
<a href="#" onclick="logout()">Logout</a>

</div>

<!-- MAIN -->

<div class="main">

<!-- HEADER -->

<div class="workspace-header">

<h1 id="teamTitle">Team Workspace</h1>

<p>
Collaborate with your team using chat, tasks, files and members.
</p>

</div>

<!-- TABS -->

<div class="tabs">

<button onclick="openTab('chat')" class="tab-btn">
<i class="fa-solid fa-comments"></i> Chat
</button>

<button onclick="openTab('files')" class="tab-btn">
<i class="fa-solid fa-file"></i> Files
</button>

<button onclick="openTab('tasks')" class="tab-btn">
<i class="fa-solid fa-list-check"></i> Tasks
</button>

<button onclick="openTab('members')" class="tab-btn">
<i class="fa-solid fa-users"></i> Members
</button>

</div>

<!-- WORKSPACE PANEL -->

<div class="workspace-panel">

<!-- CHAT -->

<div id="chat" class="tab-content">

<div id="messages" class="chat-box"></div>

<div class="chat-input">

<input id="messageInput" placeholder="Type message...">

<button onclick="sendMessage()">
<i class="fa-solid fa-paper-plane"></i> Send
</button>

</div>

</div>

<!-- FILES -->

<div id="files" class="tab-content" style="display:none">

<h3>Upload File</h3>

<br>

<input type="file" id="fileUpload">

<button onclick="uploadFile()">
<i class="fa-solid fa-upload"></i> Upload
</button>

<br><br>

<div id="fileList"></div>

</div>


<!-- TASKS -->

<div id="tasks" class="tab-content" style="display:none">

<div id="taskCreator">

<h3>Create Task</h3>

<br>

<input id="taskTitle" placeholder="Task title">

<textarea id="taskDescription"
placeholder="Task description"></textarea>

<select id="assignMembers" multiple>

</select>

<button onclick="createTask()">
<i class="fa-solid fa-plus"></i> Add Task
</button>

</div>

<br><br>

<div id="taskList"></div>

</div>

<!-- MEMBERS -->

<div id="members" class="tab-content" style="display:none">

<h3>Team Members</h3>

<br>

<input id="memberId" placeholder="Enter student ID">

<button id="addMemberBtn" onclick="addMember()">
<i class="fa-solid fa-user-plus"></i> Add Member
</button>

<br><br>

<div id="memberList"></div>

</div>

</div>

</div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/teamWorkspace.js"></script>


<script>

const savedTheme = localStorage.getItem("theme");

if(savedTheme === "dark"){
document.body.classList.add("dark-mode");
}

</script>

</body>
</html>
