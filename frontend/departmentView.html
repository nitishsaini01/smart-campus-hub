<!DOCTYPE html>
<html>
<head>
<title>Department</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="container">

<div class="sidebar">
<h2>Smart Campus</h2>

<a href="dashboard.html">Dashboard</a>
<a href="resources.html">Resources</a>
<a href="upload.html">Upload Resource</a>
<a href="students.html">Students</a>
<a href="departments.html">Departments</a>
<a href="#" onclick="logout()">Logout</a>

</div>

<div class="main">

<h1 id="deptTitle"></h1>

<p>This page will show resources for this department in the future.</p>

</div>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const deptId = params.get("id");
const name = params.get("name");

document.getElementById("deptTitle").innerText = name;

async function loadDepartmentResources(){

const res = await fetch("http://localhost:3000/api/resources");
const data = await res.json();

const main = document.querySelector(".main");

data.forEach(r=>{

if(r.department_id == deptId){

main.innerHTML += `

<div class="resource">

<h3>${r.title}</h3>

<p>${r.description}</p>

<p>Uploaded by: ${r.name}</p>

<a href="${r.file_url}" target="_blank">Open</a>

</div>

`;

}

});

}

function logout(){
localStorage.clear();
window.location.href="login.html";
}

loadDepartmentResources();

</script>

</body>
</html>
