<!DOCTYPE html>
<html>
<head>

<title>Team Collaboration</title>

<link rel="stylesheet" href="/css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<h2>Smart Campus</h2>

<button id="themeToggle" class="theme-btn">
<i class="fa-solid fa-moon"></i> Toggle Theme
</button>

<a href="dashboard.html">Dashboard</a>
<a href="resources.html">Resources</a>
<a href="upload.html">Upload Resource</a>
<a href="departments.html">Departments</a>
<a href="students.html">Students</a>
<a href="assignments.html">Assignments</a>
<a href="teams.html" class="active">Teams</a>
<a href="profile.html">Profile</a>
<a href="#" onclick="logout()">Logout</a>

</div>


<!-- MAIN CONTENT -->

<div class="main">

<h1>Team Workspace</h1>

<div class="cards">

<div class="card">

<i class="fa-solid fa-comments"></i>

<h3>Team Chat</h3>

<div id="messages" style="height:250px;overflow-y:auto;margin-bottom:10px;"></div>

<input id="messageInput" placeholder="Type message">

<button onclick="sendMessage()">Send</button>

</div>

</div>

</div>

</div>


<script src="/socket.io/socket.io.js"></script>
<script src="/js/theme.js"></script>

<script>

const socket = io("http://localhost:3000");

const user = localStorage.getItem("userName") || "Student";

const messages = document.getElementById("messages");


function sendMessage(){

const input = document.getElementById("messageInput");

const message = input.value;

if(!message) return;

socket.emit("chat message",{
sender:user,
message:message
});

input.value="";

}


socket.on("chat message",(data)=>{

messages.innerHTML += `
<p><strong>${data.sender}:</strong> ${data.message}</p>
`;

messages.scrollTop = messages.scrollHeight;

});


function logout(){

localStorage.clear();

window.location.href="login.html";

}


/* LOAD THEME */

const savedTheme = localStorage.getItem("theme");

if(savedTheme === "dark"){
document.body.classList.add("dark-mode");
}

</script>

</body>
</html>
