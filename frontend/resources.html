<!DOCTYPE html>
<html>
<head>
<title>College Resources</title>
<link rel="stylesheet" href="/css/style.css">
</head>

<body>

<div class="navbar">
<a href="/dashboard.html">Dashboard</a>
<a href="/resources.html" class="active">Resources</a>
<a href="/">Logout</a>
</div>

<h1>College Resources</h1>

<input type="text" id="search" placeholder="Search resources...">

<select id="departmentFilter">
<option value="">All Departments</option>
<option value="Computer Science">Computer Science</option>
<option value="Electronics">Electronics</option>
<option value="Mechanical">Mechanical</option>
<option value="Civil">Civil</option>
<option value="Business">Business</option>
<option value="Biology">Biology</option>
</select>

<select id="semesterFilter">
<option value="">All Semesters</option>
<option value="1">Sem 1</option>
<option value="2">Sem 2</option>
<option value="3">Sem 3</option>
<option value="4">Sem 4</option>
<option value="5">Sem 5</option>
<option value="6">Sem 6</option>
<option value="7">Sem 7</option>
<option value="8">Sem 8</option>
</select>

<button id="uploadBtn" onclick="window.location.href='/upload.html'">
Upload Resource
</button>

<div id="resourceList"></div>

<script>

const role = localStorage.getItem("role");

/* Hide upload button for students */

if(role === "student"){
document.getElementById("uploadBtn").style.display = "none";
}

async function loadResources(){

try{

const res = await fetch("http://localhost:3000/api/resources");
const data = await res.json();

const deptFilter = document.getElementById("departmentFilter").value;
const semFilter = document.getElementById("semesterFilter").value;

const list = document.getElementById("resourceList");
list.innerHTML="";

data.forEach(r=>{

/* Department + Semester filter */

if(deptFilter && r.department !== deptFilter) return;
if(semFilter && r.semester != semFilter) return;

let icon="📄";

if(r.file_url.endsWith(".pdf")) icon="📕";
if(r.file_url.endsWith(".ppt") || r.file_url.endsWith(".pptx")) icon="📊";
if(r.file_url.endsWith(".doc") || r.file_url.endsWith(".docx")) icon="📝";
if(r.file_url.endsWith(".jpg") || r.file_url.endsWith(".png")) icon="🖼️";

let deleteBtn="";

if(role === "admin"){
deleteBtn = `<button onclick="deleteResource(${r.id})">Delete</button>`;
}

list.innerHTML += `

<div class="resource">

<h3>${icon} ${r.title}</h3>

<p>${r.description}</p>

<p><b>Department:</b> ${r.department}</p>

<p><b>Semester:</b> ${r.semester}</p>

<p>Uploaded by: ${r.name}</p>

<a href="${r.file_url}" target="_blank">Open</a>

<a href="${r.file_url}" download>Download</a>

${deleteBtn}

<div class="comments">

<h4>Comments</h4>

<div id="comments${r.id}"></div>

<input type="text" id="commentInput${r.id}" placeholder="Write comment">

<button onclick="postComment(${r.id})">Post</button>

</div>

</div>

`;

loadComments(r.id);

});

}catch(err){
console.error("Error loading resources:",err);
}

}

loadResources();



async function deleteResource(id){

const confirmDelete = confirm("Delete this resource?");

if(!confirmDelete) return;

await fetch(`http://localhost:3000/api/resources/${id}`,{
method:"DELETE"
});

loadResources();

}



async function postComment(resourceId){

const name = localStorage.getItem("name");

const input = document.getElementById("commentInput"+resourceId);

const comment = input.value;

if(!comment) return alert("Write comment");

await fetch("http://localhost:3000/api/comments",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
resource_id:resourceId,
user_name:name,
comment:comment
})

});

input.value="";

loadComments(resourceId);

}



async function loadComments(resourceId){

const res = await fetch(`http://localhost:3000/api/comments/${resourceId}`);

const data = await res.json();

const list = document.getElementById("comments"+resourceId);

if(!list) return;

list.innerHTML="";

data.forEach(c=>{

list.innerHTML += `<p><b>${c.user_name}</b>: ${c.comment}</p>`;

});

}



const search = document.getElementById("search");

search.addEventListener("keyup", function(){

const value = search.value.toLowerCase();

const resources = document.querySelectorAll(".resource");

resources.forEach(r=>{

const text = r.innerText.toLowerCase();

if(text.includes(value)){
r.style.display="block";
}else{
r.style.display="none";
}

});

});



document.getElementById("departmentFilter").addEventListener("change",loadResources);
document.getElementById("semesterFilter").addEventListener("change",loadResources);

</script>
<script>

const savedTheme = localStorage.getItem("theme");

if(savedTheme === "dark"){
document.body.classList.add("dark-mode");
}

</script>

</body>
</html>
